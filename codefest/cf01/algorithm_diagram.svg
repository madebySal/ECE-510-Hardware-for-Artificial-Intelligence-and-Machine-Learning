<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- HOST MCU -->
  <rect x="20" y="185" width="110" height="56" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="75" y="208" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#2C2C2A">Host MCU</text>
  <text x="75" y="227" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">ARM Cortex-M</text>

  <!-- SPI bus arrow + label -->
  <line x1="130" y1="213" x2="178" y2="213" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="154" y="204" text-anchor="middle" font-size="11" fill="#5F5E5A">SPI</text>
  <text x="154" y="226" text-anchor="middle" font-size="11" fill="#5F5E5A">50 Mbit/s</text>

  <!-- CHIPLET BOUNDARY -->
  <rect x="183" y="50" width="477" height="380" rx="14" fill="none" stroke="#888780" stroke-dasharray="6 4" stroke-width="1.2"/>
  <text x="421" y="72" text-anchor="middle" font-size="11" fill="#888780">BNN inference chiplet</text>

  <!-- SPI SLAVE -->
  <rect x="198" y="175" width="110" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="253" y="198" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">SPI slave</text>
  <text x="253" y="217" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0F6E56">RX / TX</text>

  <!-- SPI slave → Control FSM -->
  <line x1="308" y1="203" x2="356" y2="203" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CONTROL FSM -->
  <rect x="356" y="175" width="120" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.8"/>
  <text x="416" y="198" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#26215C">Control FSM</text>
  <text x="416" y="217" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">load / run / read</text>

  <!-- Control FSM → XNOR engine -->
  <line x1="416" y1="231" x2="416" y2="275" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- XNOR-POPCOUNT ENGINE -->
  <rect x="310" y="275" width="212" height="64" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.8"/>
  <text x="416" y="300" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#4A1B0C">XNOR–popcount engine</text>
  <text x="416" y="320" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#993C1D">256 parallel units, INT1</text>

  <!-- WEIGHT BRAM -->
  <rect x="198" y="275" width="96" height="64" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
  <text x="246" y="298" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#042C53">Weight BRAM</text>
  <text x="246" y="318" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185FA5">binary packed</text>

  <!-- Weight BRAM → XNOR engine -->
  <line x1="294" y1="307" x2="310" y2="307" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ACTIVATION BUFFER -->
  <rect x="538" y="275" width="96" height="64" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
  <text x="586" y="298" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#042C53">Act. buffer</text>
  <text x="586" y="318" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#185FA5">BRAM, 1-bit</text>

  <!-- XNOR ↔ Act buffer -->
  <line x1="522" y1="295" x2="538" y2="295" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="538" y1="319" x2="522" y2="319" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OUTPUT REGISTER -->
  <rect x="340" y="370" width="152" height="36" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="416" y="391" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#085041">Output register (logits)</text>

  <!-- XNOR engine → output reg -->
  <line x1="416" y1="339" x2="416" y2="370" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output reg → SPI slave return path -->
  <path d="M340 388 L253 388 L253 231" fill="none" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="272" y="380" text-anchor="middle" font-size="11" fill="#5F5E5A">result</text>
</svg>
